# docker-compose.yml

services:
  db:
    image: pgvector/pgvector:pg16    # PostgreSQL 16 with pgvector built-in
    container_name: mediamind_db
    environment:
      POSTGRES_USER: mediamind
      POSTGRES_PASSWORD: mediamind123
      POSTGRES_DB: mediamind_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mediamind -d mediamind_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: mediamind_backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app          # live reload during development
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
  uploads_data: