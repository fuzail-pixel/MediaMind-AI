name: MediaMind AI CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libmagic1 gcc git

      - name: Install Python dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip setuptools wheel
          pip install faster-whisper==1.0.3
          pip install -r requirements.txt

      - name: Run tests with coverage
        working-directory: backend
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DATABASE_URL: postgresql://mediamind:mediamind123@localhost:5432/mediamind_db
        run: |
          pytest app/tests/ --cov=app --cov-report=term-missing --cov-fail-under=95

  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build backend Docker image
        run: |
          docker build -t mediamind-backend ./backend